{% extends 'base.html' %}

{% block main %}

<h2 class="mb-4">明細編集</h2>

<form method="post">
  {% csrf_token %}

  <div class="row g-3 mb-3">
    <div class="col-lg-12">
      <label for="{{ form.item_name.id_for_label }}" class="form-label">品目
          {% if form.item_name.field.required %}
          <span class="badge rounded-pill text-danger bg-danger-subtle ms-1 small px-2 py-1">必須</span>
          {% endif %}
      </label>
      {{ form.item_name }}
    </div>

    <div class="col-lg-4">
      <label for="{{ form.quantity.id_for_label }}" class="form-label">数量
          {% if form.quantity.field.required %}
          <span class="badge rounded-pill text-danger bg-danger-subtle ms-1 small px-2 py-1">必須</span>
          {% endif %}
      </label>
      {{ form.quantity }}
    </div>
    
    <div class="col-lg-4">
      <label for="{{ form.unit.id_for_label }}" class="form-label">単位
          {% if form.unit.field.required %}
          <span class="badge rounded-pill text-danger bg-danger-subtle ms-1 small px-2 py-1">必須</span>
          {% endif %}
      </label>
      {{ form.unit }}
    </div>
    
    <div class="col-lg-4">
      <label for="{{ form.unit_price.id_for_label }}" class="form-label">単価
          {% if form.unit_price.field.required %}
          <span class="badge rounded-pill text-danger bg-danger-subtle ms-1 small px-2 py-1">必須</span>
          {% endif %}
      </label>
      {{ form.unit_price }}
    </div>

  </div>

  <div class="d-flex justify-content-end gap-2">

        <a href="{% url 'cost_estimate_edit' object.cost_estimate.pk %}" class="btn btn-link text-decoration-none text-primary">
            キャンセル
        </a>

        <button type="submit" class="btn btn-primary">
            保存
        </button>
    </div>

</form>

{% endblock %}
